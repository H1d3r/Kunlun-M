name: kunlun-ci-scan

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      KUNLUN_INCLUDE_UNCONFIRM: "0"
      KUNLUN_WITH_VENDOR: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Debug tree-sitter
        run: |
          python -c "
          try:
              import tree_sitter_go
              from tree_sitter import Language, Parser
              lang = Language(tree_sitter_go.language())
              parser = Parser(lang)
              tree = parser.parse(b'package main')
              print('tree-sitter OK, root:', tree.root_node.type)
          except Exception as e:
              print('tree-sitter FAILED:', e)
          "
      - name: Run KunLun CI scan
        run: |
          python tools/ci_scan.py --target ci_target --output artifacts/kunlun-ci.json
          echo "--- DEBUG: Go scan detail ---"
          python -c "
          import os, sys, re
          sys.path.insert(0, '.')
          with open('ci_target/cmd_inject.go') as f:
              for i, line in enumerate(f, 1):
                  print(f'{i}: {line}', end='')
          "
          echo "--- DEBUG: Scan output ---"
          cat artifacts/kunlun-ci.json 2>/dev/null | python -m json.tool 2>/dev/null | head -80
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: kunlun-ci-report
          path: artifacts/kunlun-ci.json

